name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Enforce coverage
        run: bun run coverage

      - name: Smoke test CLI fixture
        run: |
          cd tests/fixtures/laravel-basic
          bun run ../../../src/cli/index.ts init
          bun run ../../../src/cli/index.ts index
          bun run ../../../src/cli/index.ts map --json
          bun run ../../../src/cli/index.ts pack "add expiry reminders for source-of-funds requests" --json
          bun run ../../../src/cli/index.ts tests-for app/Jobs/SendSourceOfFundsReminderJob.php
          bun run ../../../src/cli/index.ts diff-risk --json
